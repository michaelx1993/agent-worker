name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Worker contract smoke
        run: pnpm worker:contract-smoke

      - name: Codex adapter smoke
        run: pnpm codex:adapter-smoke

      - name: Codex app-server smoke
        run: pnpm codex:app-server-smoke

      - name: Worker workspace smoke
        run: pnpm worker:workspace-smoke

      - name: Workspace cleanup smoke
        run: pnpm workspace:cleanup-smoke

      - name: Compose smoke
        run: pnpm compose:smoke

      - name: Release image smoke
        run: pnpm release:image

      - name: Build
        run: pnpm build
