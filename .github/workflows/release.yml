name: Release

on:
  push:
    tags:
      - "agent-worker-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    name: Publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#agent-worker-v}"
          if [[ "${tag}" == "${version}" || -z "${version}" ]]; then
            echo "Expected tag format agent-worker-v<version>, got ${tag}" >&2
            exit 1
          fi
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/agent-worker"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Format
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Worker contract smoke
        run: pnpm worker:contract-smoke

      - name: Codex adapter smoke
        run: pnpm codex:adapter-smoke

      - name: Codex app-server smoke
        run: pnpm codex:app-server-smoke

      - name: Worker workspace smoke
        run: pnpm worker:workspace-smoke

      - name: Workspace cleanup smoke
        run: pnpm workspace:cleanup-smoke

      - name: Compose smoke
        run: pnpm compose:smoke

      - name: Release image smoke
        run: pnpm release:image

      - name: Build
        run: pnpm build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.release.outputs.image }}:${{ steps.release.outputs.version }}
            ${{ steps.release.outputs.image }}:${{ steps.release.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}

      - name: Summary
        run: |
          echo "Published ${{ steps.release.outputs.image }}:${{ steps.release.outputs.version }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Published ${{ steps.release.outputs.image }}:${{ steps.release.outputs.tag }}" >> "${GITHUB_STEP_SUMMARY}"
